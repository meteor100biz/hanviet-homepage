<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>베트남 이야기 | 한베커플</title>
  <meta name="description" content="베트남 국제결혼을 준비하는 분들을 위한 베트남 문화, 생활, 음식, 현지 이야기를 한베커플이 전합니다.">
  <meta name="keywords" content="베트남국제결혼, 국제결혼, 베트남결혼, 베트남문화, 한베커플">
  <meta property="og:title" content="베트남 이야기 | 한베커플">
  <meta property="og:description" content="베트남 국제결혼과 베트남 현지 문화를 이해하는 데 도움이 되는 이야기 모음입니다.">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .list-page{max-width:1180px;margin:0 auto;padding:72px 24px 96px}
    .story-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px;margin-top:36px}
    .story-list article{border:1px solid rgba(213,188,151,.42);border-radius:8px;background:#fff;overflow:hidden;box-shadow:0 18px 52px rgba(72,48,18,.07)}
    .story-list img{width:100%;aspect-ratio:4/3;object-fit:cover;background:#f8efe2}
    .story-list div{padding:18px}
    .story-list h2{font-size:21px;margin-bottom:8px}
    .story-list p{color:#6e6670;font-size:15px}
    .pagination{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:34px}
    .pagination button{min-width:42px;height:42px;border:1px solid rgba(213,188,151,.7);border-radius:8px;background:#fff;color:#06265c;font-weight:900;cursor:pointer}
    .pagination button.is-active{background:#06265c;color:#fff;border-color:#06265c}
    @media(max-width:900px){.story-list{grid-template-columns:1fr}.site-header{position:relative}}
  </style>
</head>
<body>
<header class="site-header">
  <a class="brand" href="../index.html" aria-label="한베커플 홈">
    <img src="../assets/images/logo.png" alt="한베커플 로고" />
    <div><strong>한베커플</strong><span>HAN-VIET COUPLE</span></div>
  </a>
  <nav class="main-nav" aria-label="주요 메뉴">
    <a href="../index.html#about">한베커플 소개</a>
    <a href="../process.html">국제결혼 절차</a>
    <a href="../fee.html">비용 안내</a>
    <a href="../vietnam-stories/">베트남 이야기</a>
    <a href="../notice/">공지사항</a>
    <a href="../faq/">FAQ</a>
  </nav>
  <a class="header-cta" href="../application.html">상담 신청하기</a>
  <details class="mobile-menu">
    <summary aria-label="모바일 메뉴 열기"><span></span><span></span><span></span></summary>
    <nav aria-label="모바일 주요 메뉴">
      <a href="../index.html#about">한베커플 소개</a>
      <a href="../process.html">국제결혼 절차</a>
      <a href="../fee.html">비용 안내</a>
      <a href="../vietnam-stories/">베트남 이야기</a>
      <a href="../notice/">공지사항</a>
      <a href="../faq/">FAQ</a>
      <a href="../application.html">상담 신청하기</a>
    </nav>
  </details>
</header>
<main class="list-page">
  <div class="section-heading">
    <p class="eyebrow">VIETNAM STORY</p>
    <h1>베트남 이야기</h1>
    <p>한베커플이 전하는 베트남 현지 이야기와 문화 기록입니다.</p>
  </div>
  <div id="storyList" class="story-list"></div>
  <div id="storyPagination" class="pagination"></div>
  <p style="text-align:center;margin-top:34px"><a class="text-link" href="../index.html">메인으로 돌아가기 →</a></p>
</main>
<script>
  var allStories = [];
  var pageSize = 9;
  var currentPage = 1;

  function renderStories() {
    var list = document.getElementById('storyList');
    var start = (currentPage - 1) * pageSize;
    var items = allStories.slice(start, start + pageSize);
    if (!items.length) {
      list.innerHTML = '<p>등록된 베트남 이야기가 없습니다.</p>';
      document.getElementById('storyPagination').innerHTML = '';
      return;
    }
    list.innerHTML = items.map(function(item){
      return '<article><a href="../' + (item.link || '#') + '"><img src="../' + (item.image || 'assets/images/gallery-ninhbinh.jpg') + '" alt="' + (item.alt || item.title || '') + '"><div><h2>' + (item.title || '제목 없음') + '</h2><p>' + (item.description || '') + '</p></div></a></article>';
    }).join('');
    renderPagination();
  }

  function renderPagination() {
    var box = document.getElementById('storyPagination');
    var totalPages = Math.ceil(allStories.length / pageSize);
    if (totalPages <= 1) {
      box.innerHTML = '';
      return;
    }
    var html = '';
    for (var index = 1; index <= totalPages; index += 1) {
      html += '<button type="button" class="' + (index === currentPage ? 'is-active' : '') + '" data-page="' + index + '">' + index + '</button>';
    }
    box.innerHTML = html;
    Array.from(box.querySelectorAll('button')).forEach(function(button){
      button.addEventListener('click', function(){
        currentPage = Number(button.dataset.page);
        renderStories();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  fetch('../data/vietnam-stories.json', { cache: 'no-store' })
    .then(function(response){ return response.json(); })
    .then(function(data){
      allStories = Array.isArray(data.items) ? data.items : [];
      renderStories();
    });
</script>
</body>
</html>
